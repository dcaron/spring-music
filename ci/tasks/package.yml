platform: linux

image_resource:
  type: docker-image
  source:
    repository: openjdk
    tag: latest

inputs:
  - name: source-code

run:
  path: "source-code/gradlew"
  args: ["--build-file", "source-code/build.gradle", "build"]

params:
  TERM: -dumb
  GRADLE_OPTS: -Dorg.gradle.native=false -Dorg.gradle.logging.level=info
